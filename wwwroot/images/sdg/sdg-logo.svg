<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- SDG Logo -->
  <circle cx="100" cy="100" r="95" fill="#0a3264"/>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SUSTAINABLE</text>
  <text x="100" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">DEVELOPMENT</text>
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">GOALS</text>
  
  <!-- Colored circles representing the 17 goals -->
  <g transform="translate(100,150) scale(0.65)">
    <!-- Row 1 -->
    <circle cx="-80" cy="-50" r="12" fill="#E5243B"/>
    <circle cx="-60" cy="-50" r="12" fill="#DDA63A"/>
    <circle cx="-40" cy="-50" r="12" fill="#4C9F38"/>
    <circle cx="-20" cy="-50" r="12" fill="#C5192D"/>
    <circle cx="0" cy="-50" r="12" fill="#FF3A21"/>
    <circle cx="20" cy="-50" r="12" fill="#26BDE2"/>
    <circle cx="40" cy="-50" r="12" fill="#FCC30B"/>
    <circle cx="60" cy="-50" r="12" fill="#A21942"/>
    <circle cx="80" cy="-50" r="12" fill="#FD6925"/>
    
    <!-- Row 2 -->
    <circle cx="-80" cy="-30" r="12" fill="#DD1367"/>
    <circle cx="-60" cy="-30" r="12" fill="#FD9D24"/>
    <circle cx="-40" cy="-30" r="12" fill="#BF8B2E"/>
    <circle cx="-20" cy="-30" r="12" fill="#3F7E44"/>
    <circle cx="0" cy="-30" r="12" fill="#0A97D9"/>
    <circle cx="20" cy="-30" r="12" fill="#56C02B"/>
    <circle cx="40" cy="-30" r="12" fill="#00689D"/>
    <circle cx="60" cy="-30" r="12" fill="#19486A"/>
  </g>
</svg> 