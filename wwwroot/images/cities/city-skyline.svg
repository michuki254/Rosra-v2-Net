    L615,520 615,460 630,460 630,420 650,420 650,460 665,460 665,520
    L680,520 680,480 695,480 695,450 710,450 710,480 730,480 730,520
    L750,520 750,500 770,500 770,520 800,520
    L800,600 Z
  " fill="#0d1f33"/>

