  <circle cx="520" cy="45" r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="680" cy="110" r="1" fill="#fff" opacity=".3"/>
  <circle cx="200" cy="150" r="1" fill="#fff" opacity=".4"/>
  <circle cx="600" cy="170" r="1.2" fill="#fff" opacity=".3"/>

  <!-- City silhouette — single path for clean look -->
