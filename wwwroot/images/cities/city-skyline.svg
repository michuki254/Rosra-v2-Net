<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1d32"/>
      <stop offset="50%" stop-color="#163a5c"/>
      <stop offset="85%" stop-color="#e8873a"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="72%" r="30%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e8873a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="800" fill="url(#sky)"/>
